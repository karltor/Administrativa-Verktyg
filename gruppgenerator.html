<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruppslumparen Pro</title>
    <style>
        :root {
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-dim: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1000px; /* Ökad bredd för att rymma två kolumner */
            padding: 40px 20px;
        }

        /* Views */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2.5rem; margin-bottom: 2rem; text-align: center; font-weight: 800; letter-spacing: -0.025em; color: var(--text); }
        h2, h3 { color: var(--text); }
        
        /* Menu */
        .new-class-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            cursor: pointer;
            border: 2px solid var(--border);
            transition: all 0.2s;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .new-class-card:hover { border-color: var(--accent); transform: translateY(-4px); }
        .new-class-card h2 { margin: 0 0 10px 0; color: var(--accent); }

        .saved-classes-section { text-align: center; }
        .saved-classes-section h2 { font-size: 1.2rem; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.05em; }
        #saved-lists-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

        /* Inputs & Buttons */
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 15px;
            box-shadow: inset 0 1px 2px rgb(0 0 0 / 0.05);
        }

        textarea { resize: vertical; min-height: 120px; }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-ghost { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); box-shadow: 0 1px 2px rgb(0 0 0 / 0.05); }
        .btn-ghost:hover { background: #f1f5f9; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; justify-content: center; font-size: 1.2rem; margin-top: 15px;}
        .btn-success:hover { filter: brightness(0.95); }

        /* Grid Layouts */
        .edit-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Desktop Layout (Två kolumner) */
        @media (min-width: 768px) {
            .edit-layout {
                grid-template-columns: 1fr 1.5fr; /* Vänster 40%, Höger 60% */
                gap: 40px;
                align-items: start;
            }
            textarea#rawNamesInput {
                height: calc(100vh - 300px); /* Gör textrutan hög på datorn */
                min-height: 400px;
            }
        }

        /* Student Chips */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin: 15px 0 30px 0; }
        .chip {
            background: #e2e8f0;
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .chip:hover { filter: brightness(0.95); }
        .chip.inactive { opacity: 0.5; background: #cbd5e1; color: var(--text-dim); text-decoration: line-through; }
        
        /* Result Cards */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .group-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border-top: 5px solid var(--accent);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .group-card h3 { margin-top: 0; font-size: 1.1rem; color: var(--accent); margin-bottom: 15px; }
        .group-card ul { list-style: none; padding: 0; margin: 0; }
        .group-card li { padding: 8px 0; border-bottom: 1px solid var(--border); }
        .group-card li:last-child { border: none; padding-bottom: 0; }

        .back-nav { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .settings-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 1px 3px rgb(0 0 0 / 0.1); }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: var(--text-dim); }
        
        .checkbox-label { display: flex; align-items: center; gap: 10px; font-weight: normal; cursor: pointer; color: var(--text); font-size: 1rem; margin-top: 15px; margin-bottom: 0; }
        .checkbox-label input[type="checkbox"] { width: auto; margin: 0; transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="view-start" class="view active">
        <h1>Gruppslumparen</h1>
        
        <div class="new-class-card" onclick="showView('view-edit'); resetApp();">
            <h2>+ Skapa ny klass</h2>
            <p style="color: var(--text-dim); margin: 0;">Skriv in eller klistra in elever för att börja</p>
        </div>

        <div class="saved-classes-section">
            <h2>Mina sparade klasser</h2>
            <div id="saved-lists-container">
                </div>
        </div>
    </div>

    <div id="view-edit" class="view">
        <div class="back-nav">
            <button class="btn btn-ghost" onclick="showView('view-start')">← Tillbaka</button>
            <button class="btn btn-danger" onclick="deleteCurrentList()">Radera klass</button>
        </div>
        
        <div class="edit-layout">
            <div class="edit-left">
                <input type="text" id="classNameInput" placeholder="Klassens namn (t.ex. 9F)" onblur="handleNameChange(this.value)">
                <textarea id="rawNamesInput" placeholder="Skriv eller klistra in namn här... (separera med radbrytning eller kommatecken)" oninput="parseNames()"></textarea>
            </div>

            <div class="edit-right">
                <div>
                    <h3 style="margin-top: 0;">Deltagare (<span id="active-count">0</span> närvarande)</h3>
                    <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: -10px;">Klicka på en elev för att markera som frånvarande (stryks över).</p>
                    <div id="student-grid" class="student-grid"></div>
                </div>

                <div class="settings-box">
                    <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 150px;">
                            <label>Elever per grupp</label>
                            <input type="number" id="groupSize" value="4" min="2">
                        </div>
                        <div style="flex: 2; min-width: 200px;">
                            <label>Fördelningslogik</label>
                            <select id="logicMode">
                                <option value="balanced">Balanserad (t.ex. 3, 3, 3, 4, 4)</option>
                                <option value="overfill">Fyll upp (t.ex. 4, 4, 4, 4, 1)</option>
                            </select>
                        </div>
                    </div>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="useRandomNames">
                        Använd roliga lagnamn (Stormen, Rävarna etc.)
                    </label>

                    <button class="btn btn-success" onclick="generateGroups()">SLUMPA GRUPPER</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-results" class="view">
        <div class="back-nav">
            <button class="btn btn-ghost" onclick="showView('view-edit')">← Ändra elever</button>
            <button class="btn btn-primary" onclick="generateGroups()">Slumpa igen</button>
        </div>
        <h1 id="result-title">Färdiga grupper</h1>
        <div id="results-grid" class="results-grid"></div>
    </div>

</div>

<script>
    let currentClass = { name: "", students: [] };
    let db = JSON.parse(localStorage.getItem('gruppslumpare_db') || '{}');
    
    const roligaLagnamn = ["Stormen", "Rävarna", "Pingvinerna", "Lejonen", "Örnarna", "Björnarna", "Vargarna", "Hajarna", "Tigrarna", "Lodjuren", "Drakarna", "Elefanterna", "Panterrarna", "Falkarna", "Kometerna"];

    // Initiera appen
    renderSavedLists();

    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        if(viewId === 'view-start') renderSavedLists();
    }

    function resetApp() {
        currentClass = { name: "", students: [] };
        document.getElementById('classNameInput').value = "";
        document.getElementById('rawNamesInput').value = "";
        document.getElementById('useRandomNames').checked = false;
        renderStudentGrid();
    }

    function handleNameChange(newName) {
        const trimmedName = newName.trim();
        if (!trimmedName) return; 
        
        if (currentClass.name && currentClass.name !== trimmedName && db[currentClass.name]) {
            delete db[currentClass.name];
        }
        
        currentClass.name = trimmedName;
        autoSave();
    }

    function parseNames() {
        const input = document.getElementById('rawNamesInput').value;
        const names = input.split(/[\n,]+/).map(n => n.trim()).filter(n => n !== "");
        
        const newStudents = names.map(name => {
            const existing = currentClass.students.find(s => s.name === name);
            return existing ? existing : { name, active: true };
        });

        currentClass.students = newStudents;
        autoSave();
        renderStudentGrid();
    }

    function renderStudentGrid() {
        const container = document.getElementById('student-grid');
        container.innerHTML = "";
        let activeCount = 0;

        if (currentClass.students.length === 0) {
            container.innerHTML = "<span style='color: var(--text-dim);'>Inga elever tillagda än...</span>";
        }

        currentClass.students.forEach((s, i) => {
            if(s.active) activeCount++;
            const div = document.createElement('div');
            div.className = `chip ${s.active ? '' : 'inactive'}`;
            div.textContent = s.name;
            div.onclick = () => toggleStudent(i);
            container.appendChild(div);
        });
        document.getElementById('active-count').textContent = activeCount;
    }

    function toggleStudent(index) {
        currentClass.students[index].active = !currentClass.students[index].active;
        autoSave();
        renderStudentGrid();
    }

    function autoSave() {
        const className = document.getElementById('classNameInput').value.trim();
        if (className || currentClass.students.length > 0) {
            const saveName = className || "Ofrälst klass";
            currentClass.name = saveName;
            db[saveName] = currentClass.students;
            localStorage.setItem('gruppslumpare_db', JSON.stringify(db));
        }
    }

    function renderSavedLists() {
        const container = document.getElementById('saved-lists-container');
        container.innerHTML = "";
        
        const keys = Object.keys(db).filter(k => db[k].length > 0); 
        
        if(keys.length === 0) {
            container.innerHTML = "<p style='color: var(--text-dim);'>Du har inga sparade klasser ännu.</p>";
            return;
        }

        keys.forEach(name => {
            const btn = document.createElement('button');
            btn.className = "btn btn-ghost";
            btn.textContent = name;
            btn.onclick = () => loadClass(name);
            container.appendChild(btn);
        });
    }

    function loadClass(name) {
        currentClass.name = name;
        currentClass.students = db[name];
        document.getElementById('classNameInput').value = name === "Ofrälst klass" ? "" : name;
        document.getElementById('rawNamesInput').value = currentClass.students.map(s => s.name).join("\n");
        renderStudentGrid();
        showView('view-edit');
    }

    function deleteCurrentList() {
        if(confirm("Är du säker på att du vill radera denna klass helt?")) {
            if (currentClass.name && db[currentClass.name]) {
                delete db[currentClass.name];
                localStorage.setItem('gruppslumpare_db', JSON.stringify(db));
            }
            showView('view-start');
        }
    }

    function generateGroups() {
        const activeNames = currentClass.students.filter(s => s.active).map(s => s.name);
        if (activeNames.length === 0) return alert("Inga elever är markerade som närvarande!");

        let shuffledStudents = [...activeNames];
        for (let i = shuffledStudents.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledStudents[i], shuffledStudents[j]] = [shuffledStudents[j], shuffledStudents[i]];
        }

        const targetSize = parseInt(document.getElementById('groupSize').value) || 4;
        const mode = document.getElementById('logicMode').value;
        const total = shuffledStudents.length;
        let sizes = [];

        if (mode === 'overfill') {
            for (let i = 0; i < total; i += targetSize) {
                sizes.push(Math.min(targetSize, total - i));
            }
        } else {
            const numGroups = Math.ceil(total / targetSize);
            const baseSize = Math.floor(total / numGroups);
            let remainder = total % numGroups;
            for (let i = 0; i < numGroups; i++) {
                sizes.push(baseSize + (remainder > 0 ? 1 : 0));
                remainder--;
            }
            sizes.sort((a,b) => b - a); 
        }

        const useRandomNames = document.getElementById('useRandomNames').checked;
        let shuffledNames = [...roligaLagnamn];
        if (useRandomNames) {
            for (let i = shuffledNames.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledNames[i], shuffledNames[j]] = [shuffledNames[j], shuffledNames[i]];
            }
        }

        const grid = document.getElementById('results-grid');
        grid.innerHTML = "";
        let currentPos = 0;

        sizes.forEach((size, i) => {
            const group = shuffledStudents.slice(currentPos, currentPos + size);
            currentPos += size;
            
            const groupTitle = useRandomNames ? `Lag ${shuffledNames[i % shuffledNames.length]}` : `Grupp ${i+1}`;
            
            const card = document.createElement('div');
            card.className = 'group-card';
            card.innerHTML = `<h3>${groupTitle}</h3><ul>${group.map(n => `<li>${n}</li>`).join('')}</ul>`;
            grid.appendChild(card);
        });

        showView('view-results');
    }
</script>
</body>
</html>
