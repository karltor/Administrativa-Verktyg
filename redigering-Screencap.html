<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Frame Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            background-color: #000;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .capture-preview {
            max-width: 200px;
            transition: transform 0.2s;
        }
        .capture-preview:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Video Freeze Frame</h1>
            <p class="text-gray-600">Ladda upp en video och spara exakta bildrutor som PNG-bilder.</p>
        </header>

        <!-- Uppladdningssektion -->
        <label id="uploadArea" for="videoInput" class="block mb-8 p-12 border-2 border-dashed border-blue-300 rounded-lg bg-white text-center cursor-pointer hover:border-blue-500 transition-colors">
            <input type="file" id="videoInput" accept="video/*" class="hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-blue-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <span class="text-lg font-medium text-gray-700">Klicka för att välja eller dra hit en video</span>
            <p class="text-sm text-gray-400 mt-2">MP4, WebM eller Ogg</p>
        </label>

        <!-- Spelar-sektion (dold tills video laddas) -->
        <div id="playerContainer" class="hidden space-y-6">
            <div class="video-container relative">
                <video id="videoPlayer" class="w-full h-auto" controls></video>
            </div>

            <!-- Kontroller -->
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 flex flex-wrap gap-4 items-center justify-center">
                <div class="flex items-center space-x-2">
                    <button id="stepBack" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-md font-medium transition-colors border border-gray-300" title="0.1s bakåt">
                        -0.1s
                    </button>
                    <button id="stepForward" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-md font-medium transition-colors border border-gray-300" title="0.1s framåt">
                        +0.1s
                    </button>
                </div>

                <button id="captureBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-md font-bold flex items-center space-x-2 shadow-lg transition-transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
                    </svg>
                    <span>Fånga bildruta</span>
                </button>

                <div class="text-sm font-mono text-gray-500" id="currentTimeDisplay">
                    Tid: 00:00.0
                </div>
            </div>
        </div>

        <!-- Galleri för sparade bilder -->
        <div id="gallerySection" class="mt-12 hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">Sparade bildrutor</h2>
                <button id="clearGallery" class="text-sm text-red-500 hover:underline">Rensa alla</button>
            </div>
            <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Bilder hamnar här -->
            </div>
        </div>
    </div>

    <!-- Osynlig canvas för bearbetning -->
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const videoInput = document.getElementById('videoInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const playerContainer = document.getElementById('playerContainer');
        const uploadArea = document.getElementById('uploadArea');
        const captureBtn = document.getElementById('captureBtn');
        const canvas = document.getElementById('canvas');
        const gallerySection = document.getElementById('gallerySection');
        const galleryGrid = document.getElementById('galleryGrid');
        const clearGallery = document.getElementById('clearGallery');
        const stepForward = document.getElementById('stepForward');
        const stepBack = document.getElementById('stepBack');
        const timeDisplay = document.getElementById('currentTimeDisplay');

        // Hantera videouppladdning
        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                videoPlayer.src = url;
                playerContainer.classList.remove('hidden');
                uploadArea.classList.add('hidden');
                gallerySection.classList.remove('hidden');
            }
        });

        // Dra och släpp-stöd
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('border-blue-500', 'bg-blue-50');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('border-blue-500', 'bg-blue-50');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('border-blue-500', 'bg-blue-50');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                videoInput.files = e.dataTransfer.files;
                const event = new Event('change');
                videoInput.dispatchEvent(event);
            }
        });

        // Uppdatera tidsdisplay
        videoPlayer.addEventListener('timeupdate', () => {
            const mins = Math.floor(videoPlayer.currentTime / 60);
            const secs = (videoPlayer.currentTime % 60).toFixed(1);
            timeDisplay.textContent = `Tid: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(4, '0')}`;
        });

        // Stega i videon
        stepForward.addEventListener('click', () => {
            videoPlayer.currentTime = Math.min(videoPlayer.duration, videoPlayer.currentTime + 0.1);
        });

        stepBack.addEventListener('click', () => {
            videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 0.1);
        });

        // Fånga bildruta
        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            // Sätt canvas till videons faktiska upplösning
            canvas.width = videoPlayer.videoWidth;
            canvas.height = videoPlayer.videoHeight;
            
            // Rita nuvarande bildruta på canvas
            ctx.drawImage(videoPlayer, 0, 0, canvas.width, canvas.height);
            
            // Skapa bild-URL
            const dataURL = canvas.toDataURL('image/png');
            const timestamp = videoPlayer.currentTime.toFixed(2);
            
            // Automatiskt ladda ner bilden till datorn direkt
            const downloadLink = document.createElement('a');
            downloadLink.href = dataURL;
            downloadLink.download = `freeze-frame-${timestamp.replace('.', '-')}.png`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            
            // Spara också till galleriet för överblick
            saveToGallery(dataURL, timestamp);
        });

        function saveToGallery(dataURL, timestamp) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow overflow-hidden border border-gray-200 group';
            
            const timeFormatted = `${Math.floor(timestamp / 60)}m ${ (timestamp % 60).toFixed(2)}s`;
            
            card.innerHTML = `
                <div class="relative">
                    <img src="${dataURL}" class="w-full aspect-video object-cover" alt="Capture at ${timestamp}">
                    <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 transition-all"></div>
                </div>
                <div class="p-3 flex justify-between items-center bg-gray-50">
                    <span class="text-xs font-medium text-gray-500">${timeFormatted}</span>
                    <a href="${dataURL}" download="freeze-frame-${timestamp.replace('.', '-')}.png" class="text-blue-600 hover:text-blue-800 p-1 rounded-full hover:bg-blue-50 transition-colors" title="Ladda ner igen">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </a>
                </div>
            `;
            
            galleryGrid.prepend(card);
            gallerySection.classList.remove('hidden');
        }

        clearGallery.addEventListener('click', () => {
            if(confirm('Vill du rensa alla sparade bilder?')) {
                galleryGrid.innerHTML = '';
            }
        });

        // Kortkommandon
        window.addEventListener('keydown', (e) => {
            if (playerContainer.classList.contains('hidden')) return;

            if (e.code === 'Space') {
                e.preventDefault();
                if (videoPlayer.paused) videoPlayer.play();
                else videoPlayer.pause();
            } else if (e.code === 'ArrowRight') {
                videoPlayer.currentTime += 0.1;
            } else if (e.code === 'ArrowLeft') {
                videoPlayer.currentTime -= 0.1;
            } else if (e.key === 'c' || e.key === 'C') {
                captureBtn.click();
            }
        });
    </script>
</body>
</html>
